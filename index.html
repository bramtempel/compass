<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f1f1f">
<title>Compass</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="splash">
  <div class="logo">Compass</div>
  <div class="msg" id="splash-msg">Loading…</div>
  <div class="progress-bar"><div class="progress-fill" id="splash-fill"></div></div>
</div>

<div id="app">

  <!-- SETUP (first run) -->
  <div class="screen" id="screen-setup">
    <div class="topbar"><span class="brand">Compass</span></div>
    <div class="screen-content">
      <div class="card">
        <h2>Connect</h2>
        <p>Defaults are pre-filled for this deployment. Add your Anthropic API key for on-tap suggestions, then connect Drive.</p>
        <div><label>Anthropic API key <span class="field-hint">(optional)</span></label><input type="password" id="setup-api-key" placeholder="sk-ant-…"></div>
        <button class="btn" id="setup-connect">Connect Drive &amp; download</button>
        <p class="err-text" id="setup-err" style="display:none"></p>
        <p class="status-text" id="setup-status"></p>
      </div>
    </div>
  </div>

  <!-- CAPTURE -->
  <div class="screen" id="screen-capture">
    <div class="topbar">
      <div class="topbar-left"><span class="brand">Compass</span>
        <span class="sync-pill" id="sync-pill"><span class="sync-dot"></span>syncing…</span></div>
      <div class="topbar-actions">
        <button class="icon-btn" id="open-browse" title="Browse all notes">▤</button>
        <button class="icon-btn" id="open-settings" title="Settings">⚙</button>
      </div>
    </div>
    <div class="screen-content">
      <div class="capture-card">
        <textarea class="capture-textarea" id="capture-input" placeholder="What's on your mind?"></textarea>
        <div class="char-count" id="char-count">0 characters</div>
      </div>
      <button class="btn" id="capture-btn" disabled>Find related</button>
      <div class="model-status" id="model-status"></div>
      <div class="section-label">Recent captures</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- RELATED -->
  <div class="screen" id="screen-related">
    <div class="topbar"><button class="back-btn" data-back="screen-capture">‹ Capture</button></div>
    <div class="screen-content" id="related-content"></div>
    <div class="float-wrap" id="float-wrap"><button class="float-btn" id="float-merge">Merge selected (0)</button></div>
  </div>

  <!-- MERGE RESULT -->
  <div class="screen" id="screen-merge-result">
    <div class="topbar"><button class="back-btn" id="merge-result-back">‹ Related</button></div>
    <div class="screen-content">
      <input id="merge-title-input" class="merge-title-input" placeholder="Title">
      <div class="section-label">Merged note</div>
      <textarea id="merge-result-body" class="result-ta tall"></textarea>
      <div class="tag-row" id="merge-tags"></div>
      <button class="btn" id="merge-save">Save note</button>
      <button class="btn-secondary" id="merge-discard">Discard</button>
    </div>
  </div>

  <!-- BESPOKE -->
  <div class="screen" id="screen-bespoke">
    <div class="topbar"><button class="back-btn" data-back="screen-related">‹ Related</button></div>
    <div class="screen-content" id="bespoke-content"></div>
  </div>

  <!-- BROWSE -->
  <div class="screen" id="screen-browse">
    <div class="topbar"><button class="back-btn" data-back="screen-capture">‹ Capture</button>
      <span class="browse-count" id="browse-count"></span></div>
    <div class="screen-content">
      <div class="browse-header">
        <div class="search-box"><input class="search-input" id="browse-search" placeholder="Search all notes…"></div>
        <div class="browse-folders" id="browse-folders"></div>
        <div class="browse-controls">
          <span class="browse-scope" id="browse-scope"></span>
          <button class="themes-toggle" id="themes-toggle" aria-expanded="false">Themes</button>
          <select class="browse-sort" id="browse-sort" aria-label="Sort notes">
            <option value="modified">Recently updated</option>
            <option value="created">Recently created</option>
            <option value="title">Title A–Z</option>
          </select>
        </div>
        <div class="browse-themes" id="browse-themes" hidden></div>
      </div>
      <div id="browse-list"></div>
    </div>
  </div>

</div>

<!-- READ SHEET -->
<div class="sheet-overlay" id="read-sheet">
  <div class="sheet">
    <div class="sheet-head">
      <span class="folder-tag" id="sheet-folder"></span>
      <button class="sheet-pin" id="sheet-pin" title="Pin">☆</button>
      <button class="sheet-close" id="sheet-close">×</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-title" id="sheet-title"></div>
      <div class="sheet-meta" id="sheet-meta"></div>
      <div class="sheet-text" id="sheet-text"></div>
    </div>
  </div>
</div>

<!-- MERGE OVERLAY -->
<div class="overlay-full" id="overlay-merge">
  <div class="overlay-full-head">
    <div><div class="overlay-title">Merge</div><div class="overlay-sub" id="merge-subtitle"></div></div>
    <button class="sheet-close" id="merge-close">×</button>
  </div>
  <div class="overlay-full-body">
    <div class="section-label">Tap a line to add / remove it</div>
    <div class="diff-legend"><span><span class="d-dot new"></span>new</span><span><span class="d-dot exist"></span>existing</span><span><span class="d-dot rem"></span>removed</span></div>
    <div id="merge-diff" class="diff-wrap"></div>
    <div class="section-label">Result</div>
    <textarea id="merge-result-ta" class="result-ta"></textarea>
    <div class="row">
      <button class="btn-secondary" id="merge-reset">Reset</button>
      <button class="btn-secondary" id="merge-rewrite">Rewrite with AI</button>
    </div>
  </div>
  <div class="overlay-full-foot">
    <button class="btn-secondary" id="merge-cancel">Cancel</button>
    <button class="btn" id="merge-approve">Approve</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settings-overlay">
  <div class="overlay-panel">
    <h2>Settings</h2>
    <div><label>Anthropic API key</label><input type="password" id="s-api-key"></div>
    <div><label>Worker URL</label><input type="text" id="s-worker-url"></div>
    <div><label>library.json file ID</label><input type="text" id="s-library-id"></div>
    <div><label>images.json manifest ID <span class="field-hint">(run publish_images.py)</span></label><input type="text" id="s-images-id"></div>
    <div><label>index.json file ID</label><input type="text" id="s-index-id"></div>
    <div><label>vectors.bin file ID</label><input type="text" id="s-vectors-id"></div>
    <div><label>suggestions.json file ID</label><input type="text" id="s-suggestions-id"></div>
    <div><label>cluster_labels.json file ID <span class="field-hint">(run label_clusters.py)</span></label><input type="text" id="s-labels-id"></div>
    <div><label>inbox/ folder ID</label><input type="text" id="s-inbox-id"></div>
    <div><label>Google OAuth Client ID</label><input type="text" id="s-client-id"></div>
    <div class="row">
      <button class="btn" id="s-save">Save</button>
      <button class="btn-secondary" id="s-resync">Re-sync</button>
    </div>
    <button class="btn-secondary" id="s-clear-captures">Clear local captures (<span id="s-cap-count">0</span>)</button>
    <button class="btn-secondary" id="s-close">Close</button>
    <p class="status-text" id="s-status"></p>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
